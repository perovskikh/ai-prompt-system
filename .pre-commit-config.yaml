#!/usr/bin/env python3
"""
Pre-commit hook to prevent ADR numbering conflicts and duplicate topics.

Validates:
1. ADR topic slug format (lowercase, kebab-case)
2. No duplicate ADR numbers in different files
3. ADR numbers are sequential
"""

import sys
import os
import re
import subprocess
from pathlib import Path

# Configuration
ADR_DIR = "docs/explanation/adr"
ALLOWED_PREFIXES = ["adr", "adr-legacy"]
MAX_ADR_NUMBER = 999

def get_adr_files():
    """Get all ADR markdown files."""
    adr_dir = Path(ADR_DIR)
    if not adr_dir.exists():
        return []

    adr_files = []
    for f in sorted(adr_dir.glob("*.md")):
        # Exclude index and summary
        if f.name in ["ADR_INDEX.md", "IMPLEMENTATION_REPORT_*.md", "FINAL-REVIEW*.md"]:
            continue

        adr_files.append(f)

    return adr_files

def parse_adr_number(filename):
    """Extract ADR number from filename (format: ADR-NNN-title.md)."""
    match = re.match(r'^ADR[-_]?(\d+)-', filename)
    if match:
        return int(match.group(1))
    return None

def validate_adr_numbering(files):
    """
    Validate ADR numbering scheme.

    Rules:
    1. ADR numbers should be sequential (1, 2, 3, ...)
    2. No gaps in numbering
    3. No duplicate numbers

    Returns: (is_valid, issues)
    """
    numbers = []
    issues = []

    for f in files:
        num = parse_adr_number(f.name)
        if num is None:
            # Skip if no valid number (like IMPLEMENTATION_REPORT)
            continue

        if num in numbers:
            issues.append(f"Duplicate ADR number: {num} in {f.name}")
        else:
            numbers.append(num)

    # Check for gaps
    if numbers:
        min_num = min(numbers)
        max_num = max(numbers)
        expected = set(range(1, max_num + 1))
        missing = expected - set(numbers)
        if missing:
            issues.append(f"Gap in ADR numbering: missing {sorted(missing)}")

    # Check max ADR number
    max_in_files = max(numbers) if numbers else 0
    if max_in_files >= MAX_ADR_NUMBER:
        issues.append(f"ADR number {max_in_files} exceeds limit of {MAX_ADR_NUMBER}")

    is_valid = len(issues) == 0
    return (is_valid, issues)

def check_duplicate_topics(files):
    """Check for duplicate ADR topic slugs."""
    slugs = {}
    issues = []

    for f in files:
        match = re.match(r'^ADR[-_]?(\d+)-([^-]+)-', f.name)
        if match:
            slug = match.group(1).lower()

            # Check if slug already exists
            if slug in slugs:
                # Found duplicate
                prev_file = slugs[slug]
                issues.append(f"Duplicate topic slug '{slug}' in {f.name} (also in {prev_file})")
            else:
                slugs[slug] = f.name

    is_valid = len(issues) == 0
    return (is_valid, issues)

def main():
    """Main hook entry point."""
    adr_files = get_adr_files()

    if not adr_files:
        print("ℹ️  No ADR files found in docs/explanation/adr/")
        return 0

    # Validate ADR numbering
    is_valid_num, num_issues = validate_adr_numbering(adr_files)

    # Validate topic slugs
    is_valid_slug, slug_issues = check_duplicate_topics(adr_files)

    all_valid = is_valid_num and is_valid_slug

    if not all_valid:
        if num_issues:
            print("🚨 ADR Numbering Issues:")
            for issue in num_issues:
                print(f"   ❌ {issue}")

        if slug_issues:
            print("🚨 Duplicate Topic Issues:")
            for issue in slug_issues:
                print(f"   ❌ {issue}")

        # Output in format expected by pre-commit
        print("ADR validation:")
        print(f"   Checked {len(adr_files)} ADR files")

        return 1

    # Extract current max ADR number
    numbers = [parse_adr_number(f.name) for f in adr_files]
    current_max = max(numbers) if numbers else 0

    print(f"✅ ADR validation passed (checked {len(adr_files)} files)")
    print(f"Current ADR range: ADR-001 to ADR-{current_max:03d}")

    return 0

if __name__ == "__main__":
    sys.exit(main())
