# Nginx configuration for p9i MCP Server
# Provides stable HTTP/MCP access with WebSocket support

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Performance
    keepalive_timeout  65;
    client_max_body_size 10M;

    # SSE / MCP endpoint
    server {
        listen 80;
        server_name p9i.local;

        # Health check endpoint
        location /health {
            proxy_pass http://mcp-server:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # SSE endpoint for MCP
        location /sse {
            proxy_pass http://mcp-server:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE specific headers
            proxy_cache off;
            proxy_buffering off;

            # Long timeout for SSE
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # MCP JSON-RPC endpoint
        location /mcp {
            proxy_pass http://mcp-server:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Normal timeout for requests
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Default - redirect to MCP
        location / {
            return 301 /mcp;
        }
    }
}
